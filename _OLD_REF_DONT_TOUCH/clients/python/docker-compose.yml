# Postgres catalog backend for the Python DuckLake CDC demo.
#
# Usage:
#   docker compose up -d --wait
#   uv run python demo/consumer.py --analytics
#   uv run python demo/producer.py --schemas 3 --tables 5 --inserts 100
#   docker compose down -v
#
# Ports:
#   5435 -> PgBouncer for normal DuckLake traffic
#   5436 -> direct Postgres for local admin/reset

services:
  postgres:
    image: postgres:17
    container_name: dlcdc-python-demo-postgres
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_USER: ducklake
      POSTGRES_PASSWORD: ducklake
      POSTGRES_DB: ducklake
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ducklake -d ducklake"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: dlcdc-python-demo-pgbouncer
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5435:5432"
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro

volumes:
  postgres-data:
